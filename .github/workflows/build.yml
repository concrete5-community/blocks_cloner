name: Build

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - main

jobs:

  build-js:
    name: Build JavaScript
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      -
        name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: build/package-lock.json
      -
        name: Install dependencies
        working-directory: build
        run: npm ci
      -
        name: Check coding style
        working-directory: build
        run: npm run lint:check
      -
        name: Build
        working-directory: build
        run: npm run prod
      -
        name: Check changes
        id: check-changes
        run: |
          git add --all assets
          if git diff-index --name-status --exit-code HEAD assets; then
            echo 'No changes detected.'
          else
            echo 'Changes detected.'
            echo 'commit=yes' >> $GITHUB_OUTPUT
          fi
      -
        name: Commit changes
        if: github.event_name == 'push' && steps.check-changes.outputs.commit == 'yes'
        run: |
          git config --local user.name 'GitHub Actions'
          git config --local user.email noreply@github.com
          git commit -m 'Update assets/view.js'
          git push

  check-php-syntax:
    name: PHP ${{ matrix.php-version }} Syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - "5.5"
          - "8.5"
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      -
        name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: opcache
          coverage: none
          tools: none
      -
        name: Check syntax
        uses: mlocati/check-php-syntax@v1
        with:
          fail-on-warnings: true

  check-php-coding-style:
    name: PHP Coding Style
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      -
        name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: php-cs-fixer:v3
      -
        name: Check coding style
        run: php-cs-fixer check --diff --ansi --no-interaction -vvv --using-cache=no

  check-development-leftovers:
    name: Check Development Leftovers
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      -
        name: Search for debugger or xdebug_break
        run: |
          echo "Scanning for 'debugger' or 'xdebug_break'..."
          matches=$(grep -Enr --include=\*.{js,php,ts} '(^|[^a-zA-Z0-9_])(debugger|xdebug_break)\b' . || true)
          if [[ -n "$matches" ]]; then
            echo "Found the following matches:"
            echo "$matches"
            echo "::error::Development leftovers found in the codebase."
            exit 1
          else
            echo "No development leftovers found."
          fi

  phpunit:
    name: PHPUnit with Concrete ${{ matrix.ccm-version }}
    runs-on: ubuntu-latest
    container: ghcr.io/concrete5-community/docker5:${{ matrix.ccm-version }}
    needs:
      - check-php-syntax
      - check-php-coding-style
      - check-development-leftovers
    strategy:
      fail-fast: false
      matrix:
        include:
          -
            ccm-version: 8.5.4
            php-version: "5.6"
            phpunit-version: 4
          -
            ccm-version: "8.5"
            php-version: "5.6"
            phpunit-version: 4
          -
            ccm-version: "9.0"
            php-version: "7.4"
            phpunit-version: 8
            phpunit-options: --do-not-cache-result
          -
            ccm-version: "9.1"
            php-version: "7.4"
            phpunit-version: 8
            phpunit-options: --do-not-cache-result
          -
            ccm-version: "9.2"
            php-version: "8.1"
            phpunit-version: 8
            phpunit-options: --do-not-cache-result
          -
            ccm-version: "9.3"
            php-version: "8.1"
            phpunit-version: 10
            phpunit-options: --do-not-cache-result
          -
            ccm-version: "9.4"
            php-version: "8.2"
            phpunit-version: 10
            phpunit-options: --do-not-cache-result
          -
            ccm-version: latest
            php-version: "8.2"
            phpunit-version: 10
            phpunit-options: --do-not-cache-result
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      -
        name: Mark the repo as safe
        run: git config --global --add safe.directory "$(pwd)" || true
      -
        name: Check composer.json
        run: sudo -u www-data composer --ansi --no-interaction validate --strict -- "$GITHUB_WORKSPACE/composer.json"
      -
        name: Start services
        run: ccm-service start db
      -
        name: Use PHP ${{ matrix.php-version }}
        if: matrix.php-version
        run: switch-php "${{ matrix.php-version }}" && php --version
      -
        name: Use PHPUnit ${{ matrix.phpunit-version }}
        if: matrix.phpunit-version
        run: switch-phpunit "${{ matrix.phpunit-version }}" && phpunit --version
      -
        name: Core info
        run: sudo -u www-data /app/concrete/bin/concrete5 --ansi --no-interaction c5:info
      -
        name: Prepare package
        run: ln -s "$GITHUB_WORKSPACE" /app/packages/blocks_cloner
      -
        name: Install package
        run: sudo -u www-data /app/concrete/bin/concrete5 --ansi --no-interaction c5:package:install blocks_cloner
      -
        name: Run PHPUnit
        working-directory: /app/packages/blocks_cloner
        run: sudo -u www-data phpunit ${{ matrix.phpunit-options }}
